<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">

        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Connexion
        </h2>

        <form [formGroup]="loginForm" (ngSubmit)="handleSubmit()" class="space-y-5">  
            <app-input-field label="Email" type="email" placeholder="exemple@mail.com" formControlName="email"></app-input-field>
                <div class="my-6"></div>
            <app-input-field label="Mot de passe" type="password" placeholder="••••••••" formControlName="password"></app-input-field>

            <div class="flex items-center justify-between text-sm my-3">
                <label class="flex items-center space-x-2">
                    <input type="checkbox" class="rounded">
                    <span>Se souvenir de moi</span>
                </label>

                <a href="#" class="text-blue-500 hover:underline">
                    Mot de passe oublié ?
                </a>
            </div>

            <app-button type="submit" text="Se connecter"></app-button>
        </form>
        
        <div class="my-6"></div>

        <p class="text-center text-sm text-gray-600">
            Pas de compte ?
            <a href="#" class="text-blue-500 hover:underline">
                S'inscrire
            </a>
        </p>
    </div>
</body>
