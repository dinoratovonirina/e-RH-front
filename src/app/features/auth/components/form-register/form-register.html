<form [formGroup]="formRegister" (ngSubmit)="registerSubmit()" class="space-y-5 w-full">
    @if (errorMsg()) {
    <div class="relative">
        <div class="absolute inset-x-0 text-center text-red-500 text-sm">
            {{ errorMsg() }}
        </div>
    </div>
    }

    <div>
        <app-input-field label="Nom" type="text" placeholder="Votre nom" formControlName="firstName" />
    </div>

    <div>
        <app-input-field label="Prenom" type="text" placeholder="Votre prénom" formControlName="lastName" />
    </div>

    <div>
        <app-input-field label="Email" type="email" placeholder="exemple@email.com" formControlName="email" />
    </div>

    <div class="flex justify-between gap-4">
        <app-input-field label="Mot de passe" type="password" placeholder="••••••••" formControlName="password" />
        <app-input-field label="Confirmation mot de passe" type="password" placeholder="••••••••"
            formControlName="confirmPassword" />
    </div>

    @if (formRegister.hasError('passwordMismatch') && formRegister.get('confirmPassword')?.touched) {
    <div class="relative">
        <div class="absolute inset-x-0 text-red-500 text-center text-sm -mt-5">
            Les mots de passe ne correspondent pas.
        </div>
    </div>
    }

    <app-button [disabled]="!formRegister.valid" type="submit" text="Envoyer" />
</form>
